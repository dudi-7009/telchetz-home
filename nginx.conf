worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    keepalive_timeout 65;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml application/xml application/xml+rss
        application/javascript application/x-javascript application/json
        image/svg+xml font/ttf font/otf application/font-woff application/font-woff2;

    server {
        listen       80 default_server;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # Security headers — relaxed CSP so lucide unpkg + Google Fonts still load
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Cache static assets aggressively
        location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Don't cache html — always fetch fresh copy (site is static and small)
        location = / {
            try_files /index.html =404;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        location = /robots.txt {
            log_not_found off;
            access_log off;
        }

        location = /sitemap.xml {
            log_not_found off;
            access_log off;
            add_header Content-Type "application/xml" always;
        }

        # Healthcheck for Docker / Traefik
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hide hidden files
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }
    }
}
