<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="sans-serif">
  <defs>
    <linearGradient id="bgGradient" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5C23C" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#D4A014" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#C4922A" fill-opacity="0.10"/>
    </pattern>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.11  0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.3"/>

  <!-- Top + bottom gold stripes -->
  <rect x="0" y="0"   width="1200" height="6" fill="#C4922A"/>
  <rect x="0" y="624" width="1200" height="6" fill="#C4922A"/>

  <!-- Top-right editorial caps (RTL safe) -->
  <g font-size="18" font-weight="700" letter-spacing="3" fill="#C4922A">
    <line x1="900" y1="62" x2="1060" y2="62" stroke="#C4922A" stroke-width="1"/>
    <text x="1140" y="68" text-anchor="end">TELCHETZ · COM</text>
  </g>

  <!-- Top-left status chip -->
  <g transform="translate(60, 52)">
    <rect x="0" y="0" width="240" height="36" fill="#0F2847" rx="4"/>
    <circle cx="20" cy="18" r="5" fill="#F5C23C"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#F5C23C">
      IN PRODUCTION · 2026
    </text>
  </g>

  <!-- Main display (centered, safe sizes, Hebrew RTL) -->
  <g fill="#0F2847">
    <text x="1140" y="220" text-anchor="end" font-size="78" font-weight="900" letter-spacing="-2">
      עם תל-חץ,
    </text>
    <text x="1140" y="310" text-anchor="end" font-size="78" font-weight="900" letter-spacing="-2">
      <tspan>אני </tspan><tspan font-style="italic" fill="#C4922A">שולט</tspan><tspan> בהכל.</tspan>
    </text>
  </g>

  <!-- Gold rule under headline -->
  <line x1="820" y1="340" x2="1140" y2="340" stroke="#C4922A" stroke-width="3"/>

  <!-- Subtitle below headline -->
  <text x="1140" y="390" text-anchor="end" font-size="30" font-weight="500" fill="#1C2B3A">
    תוכנה לניהול מוסד חינוכי · מגזר חרדי
  </text>

  <!-- Stat grid — 3 columns at bottom -->
  <g transform="translate(60, 420)">
    <!-- Column 1 -->
    <g>
      <text x="0" y="80" font-size="88" font-weight="900" fill="#0F2847" letter-spacing="-3">19</text>
      <text x="0" y="118" font-size="14" font-weight="700" letter-spacing="2" fill="#475569">
        מוסדות · 6 רשתות
      </text>
    </g>
    <!-- Column 2 -->
    <g transform="translate(270, 0)">
      <text x="0" y="80" font-size="88" font-weight="900" fill="#0F2847" letter-spacing="-3">13</text>
      <text x="0" y="118" font-size="14" font-weight="700" letter-spacing="2" fill="#475569">
        מודולים מחוברים
      </text>
    </g>
    <!-- Column 3 -->
    <g transform="translate(540, 0)">
      <text x="0" y="80" font-size="88" font-weight="900" fill="#C4922A" letter-spacing="-3">100<tspan font-size="44" font-weight="700">%</tspan></text>
      <text x="0" y="118" font-size="14" font-weight="700" letter-spacing="2" fill="#475569">
        שליטה אצל המנהל
      </text>
    </g>
  </g>

  <!-- Bottom-right: URL -->
  <g transform="translate(1140, 582)">
    <text text-anchor="end" font-size="16" font-weight="700" letter-spacing="4" fill="#0F2847">
      HTTPS://TELCHETZ.COM
    </text>
  </g>

  <!-- Gold corner accent (top-left decorative) -->
  <path d="M 0 0 L 90 0 L 0 90 Z" fill="#C4922A" fill-opacity="0.18"/>
</svg>
