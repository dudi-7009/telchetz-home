<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="sans-serif">
  <defs>
    <linearGradient id="bgGradient" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5C23C" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#D4A014" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#C4922A" fill-opacity="0.10"/>
    </pattern>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.11  0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.3"/>

  <!-- Top + bottom gold stripes -->
  <rect x="0" y="0"   width="1200" height="6" fill="#C4922A"/>
  <rect x="0" y="624" width="1200" height="6" fill="#C4922A"/>

  <!-- Top bar -->
  <g transform="translate(60, 52)">
    <rect x="0" y="0" width="260" height="38" fill="#0F2847" rx="4"/>
    <circle cx="22" cy="19" r="5" fill="#F5C23C"/>
    <text x="130" y="25" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#F5C23C">
      IN PRODUCTION · 2026
    </text>
  </g>
  <g>
    <line x1="900" y1="71" x2="1060" y2="71" stroke="#C4922A" stroke-width="1.5"/>
    <text x="1140" y="77" text-anchor="end" font-size="18" font-weight="700" letter-spacing="3" fill="#C4922A">
      TELCHETZ · COM
    </text>
  </g>

  <!-- MAIN HEADLINE — Hebrew RTL, forced with direction + unicode-bidi -->
  <!-- Using single-string text elements (no tspan styling splits) so RTL renders correctly -->
  <text x="1140" y="230" text-anchor="end"
        direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
        font-size="92" font-weight="900" letter-spacing="-3" fill="#0F2847">עם תל-חץ,</text>

  <text x="1140" y="340" text-anchor="end"
        direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
        font-size="92" font-weight="900" letter-spacing="-3" fill="#0F2847">אני שולט בהכל.</text>

  <!-- Gold underline beneath the headline -->
  <line x1="800" y1="372" x2="1140" y2="372" stroke="#C4922A" stroke-width="4"/>

  <!-- Subtitle -->
  <text x="1140" y="418" text-anchor="end"
        direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
        font-size="28" font-weight="500" fill="#1C2B3A">תוכנה לניהול מוסד חינוכי · המגזר החרדי</text>

  <!-- Stats row — each stat its own block, numbers are ASCII so no RTL issue -->
  <!-- Column 1: 19 מוסדות -->
  <g transform="translate(80, 470)">
    <text x="0" y="70" font-size="92" font-weight="900" fill="#0F2847" letter-spacing="-3">19</text>
    <text x="0" y="108" direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
          font-size="15" font-weight="700" letter-spacing="2" fill="#475569">מוסדות · 6 רשתות</text>
  </g>

  <!-- Column 2: 13 מודולים -->
  <g transform="translate(320, 470)">
    <text x="0" y="70" font-size="92" font-weight="900" fill="#0F2847" letter-spacing="-3">13</text>
    <text x="0" y="108" direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
          font-size="15" font-weight="700" letter-spacing="2" fill="#475569">מודולים מחוברים</text>
  </g>

  <!-- Column 3: 100% שליטה -->
  <g transform="translate(560, 470)">
    <text x="0" y="70" font-size="92" font-weight="900" fill="#C4922A" letter-spacing="-3">100%</text>
    <text x="0" y="108" direction="rtl" unicode-bidi="bidi-override" xml:lang="he"
          font-size="15" font-weight="700" letter-spacing="2" fill="#475569">שליטה אצל המנהל</text>
  </g>

  <!-- Bottom-right: URL -->
  <text x="1140" y="600" text-anchor="end" font-size="18" font-weight="700" letter-spacing="4" fill="#0F2847">
    HTTPS://TELCHETZ.COM
  </text>

  <!-- Gold corner accent top-left -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="#C4922A" fill-opacity="0.20"/>
</svg>
