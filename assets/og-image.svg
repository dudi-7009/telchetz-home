<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" direction="rtl">
  <!-- Fonts -->
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Secular+One&family=Bellefair&family=Heebo:wght@300;400;700&family=JetBrains+Mono:wght@500;600&display=swap');
      .display  { font-family: 'Secular One', system-ui, sans-serif; }
      .serif    { font-family: 'Bellefair', Georgia, serif; }
      .sans     { font-family: 'Heebo', system-ui, sans-serif; }
      .mono     { font-family: 'JetBrains Mono', monospace; }
    ]]></style>
    <linearGradient id="gold-fade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5C23C" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#D4A014" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#C4922A" fill-opacity="0.09"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.11  0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- Background: cream with gold sunrise + dots -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#gold-fade)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.35"/>

  <!-- Gold stripe on top -->
  <rect x="0" y="0" width="1200" height="5" fill="#C4922A"/>

  <!-- Editorial caps above hero (like the site nav caps) -->
  <g transform="translate(1120, 82)" text-anchor="end">
    <line x1="-420" y1="0" x2="-50" y2="0" stroke="#C4922A" stroke-width="1"/>
    <text class="mono" x="-30" y="5" font-size="16" font-weight="600" letter-spacing="4" fill="#C4922A">
      TELCHETZ.COM · תשפ״ו
    </text>
  </g>

  <!-- MAIN DISPLAY: Hebrew Brutalism 2026 scale -->
  <!-- Line 1: עם תל-חץ, -->
  <g transform="translate(1070, 220)">
    <text class="display" text-anchor="end" font-size="112" fill="#0F2847" letter-spacing="-6">
      עם תל-חץ,
    </text>
  </g>

  <!-- Line 2: אני שולט -->
  <!-- with "שולט" as gold italic Fraunces-style — we fake italic with skew -->
  <g transform="translate(1070, 340)">
    <text class="display" text-anchor="end" font-size="112" fill="#0F2847" letter-spacing="-6">
      <tspan>אני</tspan><tspan dx="-20" class="serif" font-style="italic" fill="#C4922A" font-size="120" transform="rotate(-1.2)">שולט</tspan>
    </text>
  </g>

  <!-- Line 3: בהכל. -->
  <g transform="translate(1070, 460)">
    <text class="display" text-anchor="end" font-size="112" fill="#0F2847" letter-spacing="-6">
      בהכל.
    </text>
  </g>

  <!-- Navy pill — "IN PRODUCTION" style chip -->
  <g transform="translate(820, 488) rotate(-2.2)">
    <rect x="-14" y="-4" width="220" height="36" fill="#0F2847" rx="3"/>
    <rect x="-10" y="0" width="220" height="36" fill="#C4922A" rx="3"/>
    <rect x="-14" y="-4" width="220" height="36" fill="#0F2847" rx="3"/>
    <text class="mono" x="96" y="20" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="4" fill="#F5C23C">
      FULL CONTROL
    </text>
  </g>

  <!-- Left column: stats + value prop -->
  <g transform="translate(64, 160)">
    <!-- Bellefair editorial headline -->
    <text class="serif" font-size="28" fill="#0F2847" letter-spacing="-0.5">
      <tspan x="0" y="0">תוכנה לניהול</tspan>
      <tspan x="0" y="36">מוסד חינוכי.</tspan>
    </text>

    <!-- Gold rule -->
    <line x1="0" y1="68" x2="120" y2="68" stroke="#C4922A" stroke-width="2"/>

    <!-- Stat block 1 -->
    <g transform="translate(0, 130)">
      <text class="display" font-size="104" fill="#0F2847" letter-spacing="-6">19</text>
      <text class="mono" x="0" y="130" font-size="11" font-weight="600" letter-spacing="2.5" fill="#475569">
        מוסדות בפנים · 6 רשתות
      </text>
    </g>

    <!-- Stat block 2 -->
    <g transform="translate(0, 330)">
      <text class="display" font-size="72" fill="#0F2847" letter-spacing="-4">13</text>
      <text class="mono" x="0" y="94" font-size="11" font-weight="600" letter-spacing="2.5" fill="#475569">
        מודולים · שליטה אחת
      </text>
    </g>
  </g>

  <!-- Bottom-left: URL + tagline -->
  <g transform="translate(64, 580)">
    <text class="mono" font-size="16" font-weight="600" letter-spacing="3" fill="#0F2847">
      TELCHETZ.COM
    </text>
    <text class="sans" x="180" y="0" font-size="13" font-weight="300" fill="#475569">
      ניהול חכם, התקדמות מהירה · מגזר החרדי
    </text>
  </g>

  <!-- Bottom-right: gold corner accent -->
  <g transform="translate(1200, 630)">
    <path d="M 0 -120 L 0 0 L -120 0 Z" fill="#C4922A" fill-opacity="0.12"/>
    <path d="M 0 -60 L 0 0 L -60 0 Z" fill="#C4922A"/>
  </g>

  <!-- Gold stripe bottom -->
  <rect x="0" y="625" width="1200" height="5" fill="#C4922A"/>
</svg>
