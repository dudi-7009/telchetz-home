<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="sans-serif">
  <defs>
    <linearGradient id="bgGradient" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5C23C" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#D4A014" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#C4922A" fill-opacity="0.10"/>
    </pattern>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.11  0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.3"/>

  <!-- Gold stripes top + bottom -->
  <rect x="0" y="0"   width="1200" height="6" fill="#C4922A"/>
  <rect x="0" y="624" width="1200" height="6" fill="#C4922A"/>

  <!-- Top bar: chip left, TELCHETZ.COM right -->
  <g transform="translate(60, 52)">
    <rect x="0" y="0" width="260" height="38" fill="#0F2847" rx="4"/>
    <circle cx="22" cy="19" r="5" fill="#F5C23C"/>
    <text x="130" y="25" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#F5C23C">
      IN PRODUCTION · 2026
    </text>
  </g>
  <g>
    <line x1="900" y1="71" x2="1060" y2="71" stroke="#C4922A" stroke-width="1.5"/>
    <text x="1140" y="77" text-anchor="end" font-size="18" font-weight="700" letter-spacing="3" fill="#C4922A">
      TELCHETZ · COM
    </text>
  </g>

  <!-- MAIN HEADLINE: Hebrew text, no direction override, no tspan with mixed styles.
       Rely on Unicode bidi for correct RTL rendering, and use text-anchor=start
       with right-edge x positioning so text grows leftward naturally. -->
  <text x="60" y="240" text-anchor="start" font-size="88" font-weight="900" letter-spacing="-3" fill="#0F2847" xml:lang="he">עם תל-חץ,</text>
  <text x="60" y="348" text-anchor="start" font-size="88" font-weight="900" letter-spacing="-3" fill="#0F2847" xml:lang="he">אני שולט בהכל.</text>

  <!-- Gold underline -->
  <line x1="60" y1="378" x2="420" y2="378" stroke="#C4922A" stroke-width="4"/>

  <!-- Subtitle -->
  <text x="60" y="425" text-anchor="start" font-size="26" font-weight="500" fill="#1C2B3A" xml:lang="he">תוכנה לניהול מוסד חינוכי · המגזר החרדי</text>

  <!-- Stats row — 3 columns -->
  <g transform="translate(60, 490)">
    <!-- Column 1 -->
    <g>
      <text x="0" y="70" font-size="84" font-weight="900" fill="#0F2847" letter-spacing="-3">19</text>
      <text x="0" y="102" font-size="13" font-weight="700" letter-spacing="2" fill="#475569" xml:lang="he">מוסדות · 6 רשתות</text>
    </g>
    <!-- Column 2 -->
    <g transform="translate(260, 0)">
      <text x="0" y="70" font-size="84" font-weight="900" fill="#0F2847" letter-spacing="-3">13</text>
      <text x="0" y="102" font-size="13" font-weight="700" letter-spacing="2" fill="#475569" xml:lang="he">מודולים מחוברים</text>
    </g>
    <!-- Column 3 — gold accent -->
    <g transform="translate(520, 0)">
      <text x="0" y="70" font-size="84" font-weight="900" fill="#C4922A" letter-spacing="-3">100%</text>
      <text x="0" y="102" font-size="13" font-weight="700" letter-spacing="2" fill="#475569" xml:lang="he">שליטה אצל המנהל</text>
    </g>
  </g>

  <!-- Bottom-right URL -->
  <text x="1140" y="600" text-anchor="end" font-size="18" font-weight="700" letter-spacing="4" fill="#0F2847">
    HTTPS://TELCHETZ.COM
  </text>

  <!-- Decorative gold triangle in top-left corner (contained, subtle) -->
  <path d="M 0 0 L 100 0 L 0 100 Z" fill="#C4922A" fill-opacity="0.22"/>

  <!-- Decorative gold triangle bottom-right -->
  <path d="M 1200 530 L 1200 624 L 1106 624 Z" fill="#C4922A" fill-opacity="0.14"/>
</svg>
